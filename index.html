<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="searchContainer">
      <input type="text" />
      <button>Search</button>
    </div>
    <div id="mainContainer">
      <h3>City, Country</h3>
      <div id="weatherContainer">
        <div id="leftContainer">
          <p>Date: now</p>
          <div class="icon main">&#9925;</div>
          <p>Partially cloudy</p>
          <span>29&#176;C</span>
          <p>Wind: 2 m/s</p>
        </div>
        <div id="rightContainer">
          <div id="day1" class="dayContainer">
            <div class="icon">&#9925;</div>
            <p>Partially cloudy</p>
            <span>29&#176;C</span>
            <p>Humidity: 77%</p>
          </div>
          <div id="day2" class="dayContainer">
            <div class="icon">&#9925;</div>
            <p>Partially cloudy</p>
            <span>29&#176;C</span>
            <p>Humidity: 77%</p>
          </div>
          <div id="day3" class="dayContainer">
            <div class="icon">&#9925;</div>
            <p>Partially cloudy</p>
            <span>29&#176;C</span>
            <p>Humidity: 77%</p>
          </div>
          <div id="day4" class="dayContainer">
            <div class="icon">&#9925;</div>
            <p>Partially cloudy</p>
            <span>29&#176;C</span>
            <p>Humidity: 77%</p>
          </div>
          <div id="day5" class="dayContainer">
            <div class="icon">&#9925;</div>
            <p>Partially cloudy</p>
            <span>29&#176;C</span>
            <p>Humidity: 77%</p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
