<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <link rel="stylesheet" href="/style.css" />
    <script src="/script.js" defer></script>
  </head>
  <body>
    <div id="searchContainer">
      <input type="text" id="searchBar" />
      <button id="searchBtn">Search</button>
    </div>
    <div id="mainContainer">
      <h3 id="location">City, Country</h3>
      <div id="weatherContainer">
        <div id="leftContainer">
          <p id="date">Date: now</p>
          <div class="icon main">&#9925;</div>
          <p id="weatherStateMain">Partially cloudy</p>
          <span id="temperatureMain">29&#176;C</span>
          <p id="windSpeedMain">Wind: 2 m/s</p>
        </div>
        <div id="rightContainer">
          <div id="day1" class="dayContainer">
            <div class="icon">&#9925;</div>
            <p id="weatherStateDay1">Partially cloudy</p>
            <span id="temperatureDay1">29&#176;C</span>
            <p id="humidityDay1">Humidity: 77%</p>
          </div>
          <div id="day2" class="dayContainer">
            <div class="icon">&#9925;</div>
            <p id="weatherStateDay2">Partially cloudy</p>
            <span id="temperatureDay2">29&#176;C</span>
            <p id="humidityDay2">Humidity: 77%</p>
          </div>
          <div id="day3" class="dayContainer">
            <div class="icon">&#9925;</div>
            <p id="weatherStateDay3">Partially cloudy</p>
            <span id="temperatureDay3">29&#176;C</span>
            <p id="humidityDay3">Humidity: 77%</p>
          </div>
          <div id="day4" class="dayContainer">
            <div class="icon">&#9925;</div>
            <p id="weatherStateDay4">Partially cloudy</p>
            <span id="temperatureDay4">29&#176;C</span>
            <p id="humidityDay4">Humidity: 77%</p>
          </div>
          <div id="day5" class="dayContainer">
            <div class="icon">&#9925;</div>
            <p id="weatherStateDay5">Partially cloudy</p>
            <span id="temperatureDay5">29&#176;C</span>
            <p id="humidityDay5">Humidity: 77%</p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
